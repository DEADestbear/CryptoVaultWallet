<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="/receive.css">
</head>
<body>

<div class="container">
  <h2>Receive Crypto</h2>

  <p>Your Wallet Address</p>
  <div class="address-box" id="address">
    0x91bF72A9cD34Ef123456789
  </div>

  <button onclick="copyAddress()">Copy Address</button>

  <p id="copyMsg"></p>

  <img src="YOUR_QR_URL_HERE" alt="QR Code">
</div>
<script>
function copyAddress() {
  const address = document.getElementById("address").innerText;
  navigator.clipboard.writeText(address);

  document.getElementById("copyMsg").innerText = "✅ Address copied!";
}
</script>

</body>
</html>
