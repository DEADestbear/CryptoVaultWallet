<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CryptoVaultWallet - Login</title>
  <link rel="stylesheet" href="/login.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>CryptoVaultWallet</h1>
      <p class="subtitle">Login to your wallet</p>

      <form action="/login" method="POST">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Enter email"
          required
        >

        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter password"
          required
        >

        <button type="submit">Login</button>
      </form>

      <div class="demo-box">
        <p><strong>Prototype demo credentials</strong></p>
        <p>Email: demo@cryptovault.com</p>
        <p>Password: Password123</p>
      </div>
    </div>
  </div>
</body>
</html>
