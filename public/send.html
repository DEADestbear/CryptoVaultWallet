<!DOCTYPE html>
<html>
<head>
  <title>Send Crypto</title>
  <link rel="stylesheet" href="/send.css">

<div class="container">
  <h2>Send Crypto</h2>

  <label>Recipient Address</label>
  <input type="text" id="address">

  <label>Amount</label>
  <input type="number" id="amount">

  <button onclick="sendCrypto()">Send</button>

</div>
  <p id="message"></p>
</div>
<p id="status"></p>

<script>
async function sendCrypto() {
  const address = document.getElementById("address").value;
  const amount = document.getElementById("amount").value;
  const status = document.getElementById("status");

  status.innerText = "Processing transaction...";

  // fake delay to simulate network latency
  setTimeout(async () => {
    try {
      const res = await fetch("http://localhost:3000/api/transactions/send", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ address, amount })
      });

      const data = await res.json();

      if (res.ok) {
        status.innerText =
          `Success!\nTxID: ${data.txId}\nNew Balance: ${data.newBalance}`;
      } else {
        status.innerText = ` ${data.message}`;
      }

    } catch (err) {
      status.innerText = "Error connecting to server";
    }
  }, 1500);
}
</script>

</body>
</html>
